# Supabase CLI config (minimal). Regenerate the full file with `supabase init` if needed.
# Workflow: `supabase link --project-ref drfvxecwgwvissuweaah` then `supabase db push`
# applies the files in supabase/migrations/. Migrations are applied via CLI/CI (or the
# Supabase MCP) — never at app runtime.
project_id = "drfvxecwgwvissuweaah"

# Local-only: analytics (logflare) + studio aren't needed for e2e and pulling
# their images trips Docker registry rate limits. Disable them so `supabase
# start` brings up only the core stack (db, auth, rest, storage, realtime).
[analytics]
enabled = false

[studio]
enabled = false

# Minimal stack for auth/data e2e (avoids pulling more images past the registry
# rate limit). Re-enable storage (+ realtime) when Epic 2 upload tests need them.
[inbucket]
enabled = false

[storage]
enabled = true

# Story 2.4 — per-node sample-output bucket (private; signed-URL reads). Mirrors the
# 20260615000008_node_outputs_bucket.sql migration so a fresh `supabase start` seeds it.
[storage.buckets.node-outputs]
public = false
file_size_limit = "100MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif", "video/mp4", "video/webm", "video/quicktime", "application/pdf"]

[realtime]
enabled = false

[edge_runtime]
enabled = false
